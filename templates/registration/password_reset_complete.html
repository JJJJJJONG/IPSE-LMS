{% extends 'base.html' %}
{% block title %}재설정 완료 - IPSE AI Academy{% endblock %}
{% block navbar %}{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-5.5rem)] flex items-center justify-center px-4 py-12 bg-gradient-to-b from-emerald-50/40 via-white to-white">
  <div class="w-full max-w-xl bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-sm">
    <div class="px-8 py-7 bg-gradient-to-r from-emerald-50 via-white to-slate-50 border-b border-slate-100">
      <p class="text-xs font-semibold tracking-[0.18em] text-emerald-700 mb-2">RESET COMPLETE</p>
      <h1 class="text-3xl font-bold text-slate-800 mb-1">비밀번호 재설정 완료</h1>
    </div>

    <div class="p-8">
      <div class="bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-xl px-4 py-4 text-sm font-medium mb-6">
        비밀번호가 성공적으로 변경되었습니다. 이제 새 비밀번호로 로그인할 수 있습니다.
      </div>
      <a class="inline-flex items-center justify-center w-full py-3 rounded-xl bg-emerald-600 text-white font-semibold hover:bg-emerald-700 transition" href="{% url 'login' %}">
        로그인하러 가기
      </a>
    </div>
  </div>
</div>
{% endblock %}
