<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPSE AI Academy - {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center">
                <a href="/" class="text-2xl font-black text-blue-600 tracking-tighter">
                    IPSE <span class="text-slate-800">AI</span>
                </a>
            </div>

            <div class="hidden md:flex items-center space-x-8 text-sm font-bold text-slate-600">
                <a href="{% url 'course_list' %}" class="hover:text-blue-600 transition">학습</a>
                <a href="#" class="hover:text-blue-600 transition">알고리즘 문제</a>
                <a href="#" class="hover:text-blue-600 transition">IPCP</a>
                <a href="#" class="hover:text-blue-600 transition">Tools</a>
                <a href="#" class="hover:text-blue-600 transition">랭킹</a>
            </div>

            <div class="flex items-center space-x-4">
                {% if user.is_authenticated %}
                    <div class="flex items-center space-x-3 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-100">
                        <div class="w-6 h-6 bg-blue-600 rounded-full flex items-center justify-center text-[10px] text-white font-bold">
                            LV.1
                        </div>
                        <span class="text-sm font-semibold text-slate-700">{{ user.username }}님</span>
                    </div>
                    <form action="{% url 'logout' %}" method="post" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-slate-400 hover:text-red-500 transition px-2">
                            <i class="fa-solid fa-right-from-bracket"></i>
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition">로그인</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-slate-200 py-8 text-center text-slate-400 text-xs">
        &copy; 2026 IPSE Club. Intelligent Pioneer of Software Engineering.
    </footer>
</body>
</html>
