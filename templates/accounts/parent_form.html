{% extends 'base.html' %}
{% load i18n %}
	{% block title %}{{ title }} | {% trans 'Learning management system' %}{% endblock title %}

{% load static %}

{% block content %}

<section class="max-w-3xl mx-auto px-6 py-10">
	<div class="bg-white border border-slate-200 rounded-md p-8 shadow-sm space-y-6">
		<h1 class="text-3xl font-semibold text-[#3F3F3F]">{% trans 'Parent Information' %}</h1>
		<form method="POST" class="space-y-4">{% csrf_token %}
			{{ form.as_p }}
			<div class="flex justify-end">
				<button type="submit" class="inline-flex items-center justify-center px-6 py-3 rounded-md bg-emerald-600 text-white text-sm font-semibold hover:bg-emerald-700 transition">
					{% trans 'Save' %}
				</button>
			</div>
		</form>
	</div>
</section>

{% endblock %}
